[General]
version = 2.0
theme = light
language = zh_CN

[Timer]
work_duration = 1500  # 25 minutes in seconds
break_duration = 300   # 5 minutes in seconds
long_break_duration = 900  # 15 minutes in seconds
work_cycles_before_long_break = 4

[Audio]
volume = 0.8
default_work_sound = lofi1.mp3
default_break_sound = ocean.mp3

[User]
auto_start_break = False
auto_start_work = False
notifications_enabled = True

[Statistics]
store_history = True
max_history_days = 365
export_format = csv

[Window]
width = 1280
height = 720
min_width = 800
min_height = 600
